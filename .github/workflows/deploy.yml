name: Deploy to OCI ARM64

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: shinhyeok22/offer-verdict:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          script: |
            # Persistent lead storage (survives container replacement)
            mkdir -p /opt/offerverdict/data/leads
            mkdir -p /opt/offerverdict/data/leads-backup

            # Stop and remove current container if it exists
            docker stop offer-verdict || true
            docker rm offer-verdict || true

            # Pull latest image
            docker pull shinhyeok22/offer-verdict:latest

            # Run new container with persistent data volume
            docker run -d \
              --name offer-verdict \
              -p 8082:8080 \
              --memory="512m" \
              -e JAVA_OPTS="-XX:+UseSerialGC -Xms128m -Xmx256m -Xss512k" \
              -e APP_LEADS_STORAGE_DIR="/app/data/leads" \
              -e APP_LEADS_BACKUP_DIR="/app/data/leads-backup" \
              -v /opt/offerverdict/data:/app/data \
              shinhyeok22/offer-verdict:latest

            # Remove dangling images
            docker image prune -f

